<!DOCTYPE html>

<html>

        <link rel="stylesheet" href="../style/doc.css">
        <title>Terminal Minecraft Launcher文档</title>

    <body>
        <p id="title">Terminal Minecraft Launcher文档</p>
        <p class="content">
安装 - 安装一个MC版本
启动 - 启动一个MC版本
用户设置 - 设置用户名，自动使用MD5进行UUID转换
可下载版本 - 输出所有可下载（包括正式版，快照版，远古版）的版本
生成启动脚本 - 生成自动启动脚本，必须先安装游戏
退出 - 退出软件
打开根目录 - 打开.minecraft文件夹
        </p>
    </body>
</html>
